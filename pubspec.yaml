name: sa_todo
description: "SA Todo - iOS 毛玻璃风格个人待办事项"
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.1.1

  # Local Storage
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  path: ^1.9.1

  # Charts
  fl_chart: ^0.70.2

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2

  # Animations
  flutter_animate: ^4.5.2
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.28

  # Data Classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: any
  riverpod_generator: any
  drift_dev: any
  freezed: any
  json_serializable: any

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        # - asset: assets/fonts/Inter-Regular.ttf
        #   weight: 400
        # - asset: assets/fonts/Inter-Medium.ttf
        #   weight: 500
        # - asset: assets/fonts/Inter-SemiBold.ttf
        #   weight: 600
        # - asset: assets/fonts/Inter-Bold.ttf
        #   weight: 700
